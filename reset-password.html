<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PredatorGuard Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260625b" />
  </head>
  <body class="auth-body" data-page="reset-password">
    <div class="page-shell auth-shell">
      <section class="auth-hero">
        <div class="brand-lockup">
          <span class="brand-mark">PG</span>
          <div>
            <p class="eyebrow">Account Recovery</p>
            <h1>PredatorGuard</h1>
          </div>
        </div>
        <p class="kicker">Recovery link required</p>
        <h2>Set a fresh password for your secure account.</h2>
        <p class="hero-text">
          Open this page from the recovery email we sent you. Once the recovery token is
          validated, you can save a new password and return to sign in.
        </p>
      </section>
      <section class="auth-card glass-card">
        <div class="section-heading">
          <div>
            <p class="eyebrow">New password</p>
            <h3>Finish recovery</h3>
          </div>
          <span class="chip">Supabase</span>
        </div>
        <form class="report-form auth-form" id="reset-password-form">
          <label>
            New password
            <input type="password" name="newPassword" minlength="8" required />
          </label>
          <label>
            Confirm password
            <input type="password" name="confirmPassword" minlength="8" required />
          </label>
          <button class="primary-button form-button" type="submit">Update password</button>
        </form>
        <div class="form-feedback" id="reset-password-feedback"></div>
      </section>
    </div>
    <script src="./config.js?v=20260625b"></script>
    <script src="./browser-app.js?v=20260625b" defer></script>
  </body>
</html>
